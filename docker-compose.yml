services:
  app:
    build: 
      context: ./others/deploykit
      dockerfile: ./dockerfile
    container_name: atcoder
    ports:
      - "2000:2000"
    volumes:
      - .:/root/atcoder:rw
    tty: true
    stdin_open: true
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined
    mem_limit: 512m
    mem_reservation: 256m